<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API 调试工具</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .section { margin: 20px 0; padding: 15px; background: #2d2d2d; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #0e639c; color: white; border: none; border-radius: 4px; }
        button:hover { background: #1177bb; }
        pre { background: #1e1e1e; padding: 10px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🔍 API 深度调试工具</h1>

    <div class="section">
        <h2>1. 配置检查</h2>
        <label>API Base URL:</label>
        <input type="text" id="baseUrl" value="/api" />
        <label>API Key:</label>
        <input type="text" id="apiKey" value="" placeholder="留空使用后端配置" />
        <label>Model:</label>
        <input type="text" id="model" value="gemini-3-flash" />
        <button onclick="testHealth()">测试健康检查</button>
        <pre id="healthResult"></pre>
    </div>

    <div class="section">
        <h2>2. 测试钩子生成（皮）</h2>
        <label>参考文案（sourceText）:</label>
        <textarea id="sourceText" rows="4">再过五年，老百姓买不起的不再是房子，而是这三样东西，尤其是第三个。</textarea>
        <label>业务背景（selfIntro）:</label>
        <textarea id="selfIntro" rows="2">我是做AI获客和内容增长的，帮助实体老板和中小企业做短视频获客。</textarea>
        <button onclick="testHookGeneration()">生成钩子（皮）</button>
        <pre id="hookResult"></pre>
    </div>

    <div class="section">
        <h2>3. 原始请求/响应查看</h2>
        <pre id="rawRequest"></pre>
        <pre id="rawResponse"></pre>
    </div>

    <script>
        let lastRequest = null;
        let lastResponse = null;

        async function testHealth() {
            const baseUrl = document.getElementById('baseUrl').value;
            const result = document.getElementById('healthResult');
            result.textContent = '正在检查...';

            try {
                const response = await fetch(`${baseUrl}/health`);
                const data = await response.json();
                result.innerHTML = `<span class="success">✓ 健康检查通过</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                result.innerHTML = `<span class="error">✗ 健康检查失败</span>\n${error.message}`;
            }
        }

        async function testHookGeneration() {
            const baseUrl = document.getElementById('baseUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const model = document.getElementById('model').value;
            const sourceText = document.getElementById('sourceText').value;
            const selfIntro = document.getElementById('selfIntro').value;
            const result = document.getElementById('hookResult');
            const rawReq = document.getElementById('rawRequest');
            const rawResp = document.getElementById('rawResponse');

            result.textContent = '正在生成钩子...';

            const systemPrompt = `你是云智道AI工作台内部使用的短视频文案生成系统。
你的核心任务：生成能拿到真实流量、停留、评论、精准关注的短视频文案。

=== 皮（开头钩子）的写法标准 ===
皮是第一注意力武器，不是一句观点或总结，而是一把抓人的钩子。

【仿写爆款任务的钩子写法 - 重要】
当任务类型是「仿写爆款」时，钩子必须基于参考文案的核心内容来写，严禁使用业务关键词。
正确做法：
- 参考文案说「再过五年，买不起的不再是房子，而是这三样东西」
- 钩子应该改写成「2025年开始，老板们最焦虑的不再是没订单，而是这三样东西你花多少钱都买不到」
- 保留核心元素：时间（五年→2025年）、数字（三样东西）、结论（买不起）
错误做法：
- 钩子写成「数字资产这件事出来，很多普通人后背发凉了」（自己编的，跟原文无关）
- 钩子写成「刘强东沉默了，马斯克也急了」（编造原文没有的人物）

=== 你服务的业务方向 ===
我是谁/做什么：${selfIntro}
注意：核心关键词仅用于业务植入（肉）和收口，严禁在钩子（皮）中使用。`;

            const userPrompt = `请生成 6 条强力开头钩子（皮）。

【核心内容】
${sourceText}

【仿写爆款 - 钩子生成要求】
1. 严禁使用业务关键词（如"数字资产"、"AI获客"、"内容增长"等），钩子必须100%基于参考文案的核心内容。
2. 提取原文的核心元素：
   - 时间元素（如"再过五年"、"2025年"、"未来三年"）
   - 数字元素（如"三样东西"、"这一件事"、"两个选择"）
   - 结论元素（如"买不起"、"来不及"、"没机会"）
   - 人物/事件元素（如果原文有具体人物或事件，必须保留）
3. 用这些核心元素改写成更炸的钩子，但不能改变原文的核心命题。
4. 6条钩子要在表达方式上有差异，但核心命题必须一致。

【通用要求】
- 每条钩子必须是第一句话就能抓住人的句子，要像判决、爆料、命令或预警。
- 6条要覆盖不同公式类型：情绪反应式、时间+后果式、强命令式、信息差式、反常识提问式、人群命运判断式。

【严禁事项】
- 严禁在钩子中使用业务关键词（数字资产、AI获客、内容增长、私域沉淀等）。
- 严禁编造原文中没有的人物、事件、热点（如马斯克、刘强东、李亚鹏等）。
- 严禁改变原文的核心命题，必须保留原文的核心元素。

只返回合法 JSON，不要 markdown，不要解释，不要多余文字。
输出结构：{
  "items": [
    {
      "id": "string",
      "text": "string",
      "type": "string",
      "platformFit": "string",
      "riskLevel": "低|中|高",
      "score": 85
    }
  ]
}`;

            const requestBody = {
                model: model,
                temperature: 0.35,
                response_format: { type: "json_object" },
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: userPrompt }
                ]
            };

            lastRequest = requestBody;
            rawReq.innerHTML = `<span class="warning">📤 发送的请求：</span>\n${JSON.stringify(requestBody, null, 2)}`;

            try {
                const headers = {
                    "Content-Type": "application/json",
                    "X-Prompt-Version": "copy-workbench-v2026-03-09",
                    "X-Task-Entry": "viral"
                };

                if (apiKey) {
                    headers["Authorization"] = `Bearer ${apiKey}`;
                }

                const response = await fetch(`${baseUrl}/chat/completions`, {
                    method: "POST",
                    headers: headers,
                    body: JSON.stringify(requestBody)
                });

                const rawText = await response.text();
                lastResponse = rawText;

                rawResp.innerHTML = `<span class="warning">📥 收到的原始响应（status: ${response.status}）：</span>\n${rawText}`;

                if (!response.ok) {
                    result.innerHTML = `<span class="error">✗ API 调用失败（${response.status}）</span>\n${rawText}`;
                    return;
                }

                const parsed = JSON.parse(rawText);
                const content = parsed?.choices?.[0]?.message?.content;

                if (!content) {
                    result.innerHTML = `<span class="error">✗ 模型未返回内容</span>\n${JSON.stringify(parsed, null, 2)}`;
                    return;
                }

                // 尝试解析 content
                let data;
                try {
                    data = JSON.parse(content);
                } catch (e) {
                    // 尝试提取 JSON 块
                    const match = content.match(/```(?:json)?\s*([\s\S]*?)```/i);
                    if (match) {
                        data = JSON.parse(match[1].trim());
                    } else {
                        const firstBrace = content.indexOf("{");
                        const lastBrace = content.lastIndexOf("}");
                        if (firstBrace >= 0 && lastBrace > firstBrace) {
                            data = JSON.parse(content.slice(firstBrace, lastBrace + 1));
                        } else {
                            throw new Error("无法提取 JSON");
                        }
                    }
                }

                // 检查生成的钩子是否符合要求
                const analysis = analyzeHooks(data.items, sourceText);

                result.innerHTML = `<span class="success">✓ 成功生成 ${data.items.length} 条钩子</span>\n\n` +
                    `<span class="${analysis.isValid ? 'success' : 'error'}">${analysis.isValid ? '✓' : '✗'} 质量检查：${analysis.message}</span>\n\n` +
                    `生成的钩子：\n${JSON.stringify(data, null, 2)}`;

            } catch (error) {
                result.innerHTML = `<span class="error">✗ 请求失败</span>\n${error.message}\n${error.stack}`;
            }
        }

        function analyzeHooks(hooks, sourceText) {
            const issues = [];

            // 检查是否包含业务关键词
            const businessKeywords = ['数字资产', 'AI获客', '内容增长', '私域', '流量', '获客'];
            const hasBusinessKeyword = hooks.some(hook =>
                businessKeywords.some(kw => hook.text.includes(kw))
            );

            if (hasBusinessKeyword) {
                issues.push('❌ 钩子中包含业务关键词（应该只基于参考文案）');
            }

            // 检查是否编造了人物
            const fakePeople = ['马斯克', '刘强东', '李亚鹏', '章泽天', '黄仁勋'];
            const hasFakePeople = hooks.some(hook =>
                fakePeople.some(name => hook.text.includes(name) && !sourceText.includes(name))
            );

            if (hasFakePeople) {
                issues.push('❌ 钩子中编造了原文没有的人物');
            }

            // 提取原文核心元素
            const hasTimeElement = /\d+年|未来|再过/.test(sourceText);
            const hasNumberElement = /[一二三四五六七八九十\d]+[样个件条]/.test(sourceText);
            const hasConclusionElement = /买不起|来不及|没机会|焦虑|可怕/.test(sourceText);

            // 检查钩子是否保留了核心元素
            const preservesCore = hooks.some(hook => {
                const hookHasTime = hasTimeElement && /\d+年|未来|再过|开始/.test(hook.text);
                const hookHasNumber = hasNumberElement && /[一二三四五六七八九十\d]+[样个件条]/.test(hook.text);
                const hookHasConclusion = hasConclusionElement && /买不起|来不及|没机会|焦虑|可怕/.test(hook.text);
                return hookHasTime || hookHasNumber || hookHasConclusion;
            });

            if (!preservesCore) {
                issues.push('⚠️ 钩子可能没有保留原文的核心元素');
            }

            return {
                isValid: issues.length === 0,
                message: issues.length === 0 ? '所有钩子都符合要求' : issues.join('\n')
            };
        }

        // 页面加载时自动测试健康检查
        window.onload = () => {
            testHealth();
        };
    </script>
</body>
</html>
